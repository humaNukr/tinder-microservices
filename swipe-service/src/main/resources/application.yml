server:
  port: 8083

spring:
  application:
    name: swipe-service

  datasource:
    url: jdbc:postgresql://localhost:5433/swipe_db
    username: user
    password: password
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10

  threads:
    virtual:
      enabled: true

  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.yaml

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: swipe-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

app:
  security:
    gateway-auth:
      enabled: true
      header-name: X-Gateway-Authenticated
      expected-value: "true"
      user-id-header: X-User-Id
  kafka:
    topics:
      match: match-events
      swipe: swipe-events
      user-activity: user-activity-events
  swipe:
    rate-limit:
      max-likes-per-day: 100

  redis:
    prefixes:
      limit-key-prefix: "swipe:rate_limit:right:"

outbox:
  scheduler:
    batch-size: 50
    batch-processing-time: 5 #seconds
    fixed-delay: 2000 #ms
    cleanup-cron: "0 0 3 * * *"