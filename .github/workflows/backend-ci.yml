name: Backend CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    name: ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - profile-service
          - swipe-service
          - feed-service
          - chat-service
          - notification-service
          - api-gateway

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make gradlew executable
        working-directory: ./${{ matrix.service }}
        run: chmod +x ./gradlew

      - name: Start Infrastructure (Docker Compose)
        if: matrix.service != 'api-gateway' && matrix.service != 'notification-service'
        run: |
          docker compose up -d
          sleep 15

      - name: Check Code Style (Spotless)
        working-directory: ./${{ matrix.service }}
        run: ./gradlew spotlessCheck

      - name: Build and Test
        working-directory: ./${{ matrix.service }}
        run: ./gradlew build --stacktrace
