version: '3.8'
services:
  # --- DATABASES (Isolated per service) ---
  auth_postgres:
    image: postgres:15-alpine
    container_name: auth_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data

  profile_mongodb:
    image: mongo:7.0
    container_name: profile_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: profile_db
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  swipe_postgres:
    image: postgres:15-alpine
    container_name: swipe_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: swipe_db
    ports:
      - "5433:5432"
    volumes:
      - swipe_postgres_data:/var/lib/postgresql/data

  chat_postgres:
    image: postgres:15-alpine
    container_name: chat_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: chat_db
    ports:
      - "5434:5432"
    volumes:
      - chat_postgres_data:/var/lib/postgresql/data

  notification_postgres:
    image: postgres:15-alpine
    container_name: notification_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: notification_db
    ports:
      - "5435:5432"
    volumes:
      - notification_postgres_data:/var/lib/postgresql/data

  # --- SHARED INFRASTRUCTURE (Used by multiple services) ---
  shared_redis:
    image: redis:7-alpine
    container_name: shared_redis
    ports:
      - "6379:6379"

  shared_minio:
    image: minio/minio
    container_name: shared_minio
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
      MINIO_NOTIFY_KAFKA_ENABLE_1: "on"
      MINIO_NOTIFY_KAFKA_BROKERS_1: "shared-kafka:29092"
      MINIO_NOTIFY_KAFKA_TOPIC_1: "minio-chat-media-events"
      MINIO_NOTIFY_KAFKA_PRODUCER_ACKS_1: "all"
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    depends_on:
      - shared_kafka
    networks:
      default:
        aliases:
          - shared-minio

  minio-init:
    image: minio/mc
    container_name: minio-init
    depends_on:
      - shared_minio
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO to start...';
      while ! /usr/bin/mc alias set myminio http://shared-minio:9000 admin password123; do
        echo 'MinIO is not ready yet, retrying in 2 seconds...';
        sleep 2;
      done;
      echo 'MinIO is up! Configuring bucket and events...';
      /usr/bin/mc mb myminio/tinder-chat-media --ignore-existing;
      /usr/bin/mc event add myminio/tinder-chat-media arn:minio:sqs::1:kafka --event put;
      echo 'MinIO initialization complete.';
      exit 0;
      "

  shared_kafka:
    image: apache/kafka:3.7.0
    container_name: shared_kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://shared_kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@shared_kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      default:
        aliases:
          - shared-kafka

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: shared_kafka:29092
    depends_on:
      - shared_kafka

volumes:
  auth_postgres_data:
  swipe_postgres_data:
  chat_postgres_data:
  notification_postgres_data:
  mongo_data:
  minio_data:
  kafka_data: