server:
  port: 8080

spring:
  application:
    name: api-gateway

  management:
    tracing:
      enabled: true
      sampling:
        probability: 1.0
    zipkin:
      tracing:
        endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}

  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
          routes:
            - id: public-media-route
              uri: http://localhost:9000
              predicates:
                - Path=/media/**
              filters:
                - RewritePath=/media/(?<segment>.*), /tinder-media/$\{segment}

            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/auth/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenish-rate: 5
                    redis-rate-limiter.burst-capacity: 10
                    key-resolver: "#{@ipKeyResolver}"

            - id: profile-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/profiles,/api/v1/profiles/**

            - id: swipe-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/v1/swipes,/api/v1/swipes/**

            - id: chat-service
              uri: http://localhost:8084
              predicates:
                - Path=/ws/chat/**,/api/v1/chats,/api/v1/chats/**

            - id: notification-service
              uri: http://localhost:8085
              predicates:
                - Path=/api/v1/notifications,/api/v1/notifications/**

            - id: feed-service
              uri: http://localhost:8086
              predicates:
                - Path=/api/v1/feed,/api/v1/feed/**


jwt:
  secret: ${JWT_SECRET}