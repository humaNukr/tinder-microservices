server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
          routes:
            - id: public-media-route
              uri: http://localhost:9000
              predicates:
                - Path=/media/**
              filters:
                - RewritePath=/media/(?<segment>.*), /tinder-media/$\{segment}

            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/auth,/api/v1/auth/**

            - id: profile-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/profiles,/api/v1/profiles/**

            - id: swipe-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/v1/swipes,/api/v1/swipes/**

            - id: chat-service
              uri: http://localhost:8084
              predicates:
                - Path=/ws/chat/**,/api/v1/chats,/api/v1/chats/**

            - id: notification-service
              uri: http://localhost:8085
              predicates:
                - Path=/api/v1/notifications,/api/v1/notifications/**

            - id: feed-service
              uri: http://localhost:8086
              predicates:
                - Path=/api/v1/feed,/api/v1/feed/**


jwt:
  secret: ${JWT_SECRET}