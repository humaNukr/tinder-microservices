server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/auth/**

            - id: profile-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/profiles/**

jwt:
  secret: ${JWT_SECRET}