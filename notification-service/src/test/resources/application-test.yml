server:
  port: 0

spring:
  application:
    name: notification-service-test

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      auto-offset-reset: earliest

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

  liquibase:
    enabled: true

app:
  security:
    gateway-auth:
      enabled: false
  notifications:
    default-page-size: 20
    max-page-size: 100
  kafka:
    topics:
      message-events: message-events-test
      match-events: match-events-test
    consumer-groups:
      notification-service: notification-service-test-group

logging:
  level:
    com.tinder.notification: DEBUG
    org.springframework.kafka: WARN
