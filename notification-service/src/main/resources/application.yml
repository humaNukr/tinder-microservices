server:
  port: 8085

spring:
  application:
    name: notification-service

  management:
    tracing:
      enabled: true
      sampling:
        probability: 1.0
    zipkin:
      tracing:
        endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}
    endpoints:
      web:
        exposure:
          include: health,info,metrics,prometheus
    metrics:
      export:
        prometheus:
          enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5435/notification_db
    username: user
    password: password
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  threads:
    virtual:
      enabled: true

app:
  security:
    gateway-auth:
      enabled: true
      header-name: X-Gateway-Authenticated
      expected-value: "true"
      user-id-header: X-User-Id
  notifications:
    default-page-size: 20
    max-page-size: 100
  kafka:
    topics:
      message-events: message-events
      match-events: match-events
      user-activity: user-activity-events
    consumer-groups:
      notification-service: notification-group