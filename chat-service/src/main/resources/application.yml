server:
  port: 8084

spring:
  application:
    name: chat-service

  datasource:
    url: jdbc:postgresql://localhost:5434/chat_db
    username: user
    password: password
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10

  threads:
    virtual:
      enabled: true

  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.yaml

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

app:
  kafka:
    topics:
      match-events: match-events
      message-events: message-events
      minio-chat-media-events: minio-chat-media-events
    consumer-groups:
      chat-service: chat-service-group

  redis:
    chat:
      channel: chat-channel
      key-prefix: "chat:"
      key-suffix: :participants
      ttl: 7d #Days (duration format)

  outbox:
    scheduler:
      poll-interval: 1000
      batch-size: 50
      batch-processing-time: 5 #seconds
      fixed-delay: 2000 #ms
      cleanup-cron: "0 0 3 * * *"

  minio:
    url: http://localhost:9000
    access-key: admin
    secret-key: password123
    bucket-name: tinder-chat-media