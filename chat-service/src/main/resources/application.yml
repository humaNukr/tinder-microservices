server:
  port: 8084

spring:
  application:
    name: chat-service

  datasource:
    url: jdbc:postgresql://localhost:5434/chat_db
    username: user
    password: password
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10

  threads:
    virtual:
      enabled: true

  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.yaml

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

app:
  kafka:
    topics:
      match-events: match-events
      message-events: message-events
      minio-chat-media-events: minio-chat-media-events
      user-presence-events: user-presence-events
    consumer-groups:
      chat-service: chat-service-group

  redis:
    chat:
      channel: chat-channel
      typing-channel: chat-typing-channel
      read-receipt-channel: chat-read-receipt-channel
      key-prefix: "chat:"
      key-suffix: ":participants"
      ttl: 7d
    presence:
      channel: user-presence-channel
      session-key-prefix: "user:sessions:"
      grace-period-prefix: "user:grace:"
      grace-period-duration: 15s

  outbox:
    scheduler:
      poll-interval: 1000
      batch-size: 50
      batch-processing-time: 5 #seconds
      fixed-delay: 2000 #ms
      cleanup-cron: "0 0 3 * * *"

  websocket:
    app-destination-prefix: "/app"
    user-destination-prefix: "/user"
    chat-endpoint: "/ws/chat"
    queue-messages: "/queue/messages"
    queue-acks: "/queue/acks"
    queue-read-receipts: "/queue/read-receipts"
    topic-users-prefix: "/topic/users"
    topic-users-presence-suffix: "/presence"

  minio:
    url: http://localhost:9000
    access-key: admin
    secret-key: password123
    bucket-name: tinder-chat-media