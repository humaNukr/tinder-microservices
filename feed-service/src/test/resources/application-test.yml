server:
  port: 0

spring:
  application:
    name: feed-service-test

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: feed-service-test-group
      auto-offset-reset: earliest

  threads:
    virtual:
      enabled: true

app:
  kafka:
    topics:
      swipe-events: swipe-events-test
      user-activity: user-activity-events-test

  services:
    profile:
      url: http://localhost:8082
      candidates-path: /api/v1/internal/profiles/candidates
      batch-path: /api/v1/internal/profiles/batch

  feed:
    page-size: 10
    deck-size: 20
    fetch-limit: 50
    refill-threshold: 5

logging:
  level:
    org.springframework.web.client.RestTemplate: DEBUG
    com.github.tomakehurst.wiremock: INFO
    com.tinder.feed: DEBUG
