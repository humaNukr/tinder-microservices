server:
  port: 8086

spring:
  application:
    name: feed-service

  management:
    tracing:
      enabled: true
      sampling:
        probability: 1.0
    zipkin:
      tracing:
        endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}
    endpoints:
      web:
        exposure:
          include: health,info,metrics,prometheus
    metrics:
      export:
        prometheus:
          enabled: true

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: feed-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  threads:
    virtual:
      enabled: true

app:
  security:
    gateway-auth:
      enabled: true
      header-name: X-Gateway-Authenticated
      expected-value: "true"
      user-id-header: X-User-Id
  kafka:
    topics:
      swipe-events: swipe-events
      user-activity: user-activity-events

  services:
    profile:
      url: http://localhost:8082
      candidates-path: /api/v1/internal/profiles/candidates
      batch-path: /api/v1/internal/profiles/batch

  feed:
    page-size: 10          # Number of cards returned to the frontend per request
    deck-size: 100         # Number of cards kept in Redis after generation
    fetch-limit: 500       # Number of profiles requested from profile-service for selection
    refill-threshold: 20   # Threshold: if fewer than 20 cards remain in the deck, start background refill

resilience4j:
  retry:
    instances:
      profileService:
        max-attempts: 3
        wait-duration: 500ms
        retry-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.client.HttpServerErrorException

  circuitbreaker:
    instances:
      profileService:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
